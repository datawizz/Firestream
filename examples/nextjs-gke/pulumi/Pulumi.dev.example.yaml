# Copy to Pulumi.dev.yaml and fill in. Secret values are set separately with
# `pulumi config set --secret` so they never appear in plaintext here:
#
#   pulumi stack init dev
#   pulumi config set gcp:project   my-gcp-project
#   pulumi config set gcp:region    us-central1
#   pulumi config set clusterName   firestream-nextjs
#   pulumi config set arRepo        firestream
#   pulumi config set --secret dbPassword          "$(openssl rand -base64 24)"
#   pulumi config set --secret dbPostgresPassword  "$(openssl rand -base64 24)"
config:
  gcp:project: my-gcp-project
  gcp:region: us-central1
  firestream-nextjs-gke:clusterName: firestream-nextjs
  firestream-nextjs-gke:arRepo: firestream
  # dbPassword / dbPostgresPassword: set with `--secret`.
