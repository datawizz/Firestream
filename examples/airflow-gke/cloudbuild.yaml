# ---------------------------------------------------------------------------
# Cloud Build pipeline: build + push the firestream-* images (incl. the custom
# airflow image with the baked DAG), build the customized Airflow chart bundle,
# then deploy it to GKE with Secrets sourced from GCP Secret Manager at deploy
# time.
#
# Substitutions MUST match examples/airflow-gke/config.nix. Connect this file to
# a Cloud Build trigger in the console (the Pulumi stack already grants the
# Cloud Build service account the roles it needs).
#
# Notes:
#   * Nix steps run in the official `nixos/nix` image with flakes enabled.
#   * /workspace is shared across steps; /nix/store is NOT — so the chart
#     bundle is built and deployed in the SAME nix step (its bin/deploy
#     references a helm store path that only exists in that step).
#   * The auth step bakes a bearer-token kubeconfig into /workspace so the
#     nix/helm step needs no gke-gcloud-auth-plugin on its PATH.
# ---------------------------------------------------------------------------
substitutions:
  _REGION: us-central1
  _CLUSTER: firestream-airflow
  _NAMESPACE: airflow
  _AR_HOST: us-central1-docker.pkg.dev
  _AR_REPO: ${PROJECT_ID}/firestream
  _IMAGE_TAG: latest

steps:
  # 1. Build the three container images to tarballs in /workspace.
  - id: build-images
    name: nixos/nix
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        for pkg in airflow-image postgresql-image redis-image; do
          nix --extra-experimental-features 'nix-command flakes' \
            build ".#$pkg" -o "/workspace/$pkg"
          cp -L "/workspace/$pkg" "/workspace/$pkg.tar.gz"
        done

  # 2. Load, tag, and push the images to Artifact Registry.
  #    Cloud Build auto-authenticates the docker builder to AR in-project.
  - id: push-images
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        push() {
          local tar="$1" name="$2"
          local loaded
          loaded="$(docker load -i "$tar" | sed -n 's/^Loaded image: //p' | head -n1)"
          docker tag "$loaded" "${_AR_HOST}/${_AR_REPO}/${name}:${_IMAGE_TAG}"
          docker push "${_AR_HOST}/${_AR_REPO}/${name}:${_IMAGE_TAG}"
        }
        push /workspace/airflow-image.tar.gz firestream-airflow
        push /workspace/postgresql-image.tar.gz firestream-postgresql
        push /workspace/redis-image.tar.gz firestream-redis

  # 3. Authenticate to GKE, bake a token kubeconfig, and sync Secrets from
  #    Secret Manager. This builder has kubectl + the GKE auth plugin.
  - id: auth-and-secrets
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud container clusters get-credentials "${_CLUSTER}" \
          --region "${_REGION}" --project "${PROJECT_ID}"
        # Replace the exec-plugin credential with a static bearer token so the
        # downstream nix/helm step authenticates without the auth plugin.
        ctx="$(kubectl config current-context)"
        kubectl config set-credentials cb-token --token="$(gcloud auth print-access-token)"
        kubectl config set-context "$ctx" --user=cb-token
        cp "$HOME/.kube/config" /workspace/kubeconfig
        bash scripts/sync-secrets.sh "${_NAMESPACE}"

  # 4. Build the customized chart bundle and deploy it (helm upgrade --install
  #    via the bundle's own bin/deploy), using the token kubeconfig.
  - id: deploy
    name: nixos/nix
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        nix --extra-experimental-features 'nix-command flakes' \
          build .#airflow-chart -o /workspace/result
        export KUBECONFIG=/workspace/kubeconfig
        /workspace/result/bin/deploy --namespace "${_NAMESPACE}"

options:
  machineType: E2_HIGHCPU_8
timeout: 3600s
