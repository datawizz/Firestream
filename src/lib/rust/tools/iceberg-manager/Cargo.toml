[package]
name = "iceberg-manager"
version = "0.1.0"
edition = "2021"

[dependencies]
# Core iceberg-rust implementation
iceberg = { workspace = true }
iceberg-datafusion = { workspace = true }
iceberg-catalog-rest = { workspace = true }
iceberg-catalog-memory = { workspace = true }

# DuckDB for TPC-H and TPC-DS generation
duckdb = { version = "1.3.0", features = ["bundled"] }

# DataFusion and Arrow
datafusion = { workspace = true }
arrow = { workspace = true }
arrow-schema = { workspace = true }
arrow-array = { workspace = true }
arrow-cast = { workspace = true }

# Async runtime
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Utilities
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true, features = ["derive"] }
comfy-table = { workspace = true }
futures = { workspace = true }
futures-util = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
directories = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
uuid = { workspace = true, features = ["v4", "serde"] }
url = "2.5"

[dev-dependencies]
tempfile = "3"

[[bin]]
name = "iceberg-manager"
path = "src/main.rs"
