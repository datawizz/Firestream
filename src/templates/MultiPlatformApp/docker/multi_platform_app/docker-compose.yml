services:
  devcontainer:
    init: true
    image: ${PROJECT_NAME:-multi_platform_app}:latest
    build:
      context: ../../
      dockerfile: docker/multi_platform_app/Dockerfile
      target: devcontainer
      args:
        HOST_USERNAME: ${HOST_USERNAME:-developer}
        HOST_USER_ID: ${HOST_USER_ID:-1000}
        HOST_GROUP_ID: ${HOST_GROUP_ID:-1000}
        HOST_DOCKER_GID: ${HOST_DOCKER_GID:-999}
    environment:
      - PROJECT_NAME=${PROJECT_NAME:-multi_platform_app}
      - DEPLOYMENT_MODE=development
      - DOCKER_BUILDKIT=1
    volumes:
      # Mount the project directory
      - ../..:/workspace

      # Enable Docker-from-Docker
      - /var/run/docker.sock:/var/run/docker-host.sock

      # # Optional: Mount SSH keys for git operations
      # - ~/.ssh:/home/${HOST_USERNAME:-developer}/.ssh:ro

      # # Optional: Mount git config
      # - ~/.gitconfig:/home/${HOST_USERNAME:-developer}/.gitconfig:ro

    # Required for network operations
    cap_add:
      - NET_ADMIN

    # Network mode - can be changed to "bridge" if needed
    # network_mode: "host"

    # Keep container running
    command: sleep infinity

