[package]
name = "multi_platform_app-mobile"
version = "0.1.0"
description = "MultiPlatformApp mobile (iOS)"
edition = "2021"

[lib]
name = "multi_platform_app_mobile_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-opener = "2"
tauri-plugin-deep-link = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
keyring = "3"
thiserror = "2"
