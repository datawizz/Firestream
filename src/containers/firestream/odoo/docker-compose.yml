# Firestream Odoo - Docker Compose
# Uses Nix-based Odoo container with official PostgreSQL

services:
  postgresql:
    image: postgres:16
    volumes:
      - 'postgresql_data:/var/lib/postgresql/data'
    environment:
      - POSTGRES_USER=bn_odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=bitnami_odoo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bn_odoo -d bitnami_odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    build:
      context: ../../../..
      dockerfile: src/containers/firestream/odoo/18/debian-12/Dockerfile
    image: firestream-odoo:18-nix
    ports:
      - '8069:8069'
      - '8072:8072'
    volumes:
      - 'odoo_data:/var/odoo/data'
      - 'odoo_addons:/var/odoo/custom-addons'
      - 'odoo_config:/var/odoo/config'
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - ODOO_DATABASE_HOST=postgresql
      - ODOO_DATABASE_PORT_NUMBER=5432
      - ODOO_DATABASE_USER=bn_odoo
      - ODOO_DATABASE_PASSWORD=odoo
      - ODOO_DATABASE_NAME=bitnami_odoo
      - ODOO_EMAIL=admin@example.com
      - ODOO_PASSWORD=admin

volumes:
  postgresql_data:
    driver: local
  odoo_data:
    driver: local
  odoo_addons:
    driver: local
  odoo_config:
    driver: local
