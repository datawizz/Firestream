# Firestream Odoo - Docker Compose
# Uses Nix-based Odoo container with Firestream PostgreSQL
# Set ODOO_VERSION to select version (default: 18)

services:
  postgresql:
    image: firestream-postgresql:17
    volumes:
      - 'postgresql_data:/firestream/postgresql'
    environment:
      POSTGRESQL_USERNAME: firestream
      POSTGRESQL_PASSWORD: firestream
      POSTGRESQL_DATABASE: firestream_odoo
      ALLOW_EMPTY_PASSWORD: "no"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firestream -d firestream_odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: firestream-odoo:${ODOO_VERSION:-18}.0
    container_name: firestream-odoo-${ODOO_VERSION:-18}
    ports:
      - '8069:8069'
      - '8072:8072'
    volumes:
      - 'odoo_data:/opt/odoo/data'
      - 'odoo_addons:/opt/odoo/addons'
      - 'odoo_config:/opt/odoo/conf'
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - ODOO_DATABASE_HOST=postgresql
      - ODOO_DATABASE_PORT_NUMBER=5432
      - ODOO_DATABASE_USER=firestream
      - ODOO_DATABASE_PASSWORD=firestream
      - ODOO_DATABASE_NAME=firestream_odoo
      - ODOO_EMAIL=admin
      - ODOO_PASSWORD=admin

volumes:
  postgresql_data:
    driver: local
  odoo_data:
    driver: local
  odoo_addons:
    driver: local
  odoo_config:
    driver: local
