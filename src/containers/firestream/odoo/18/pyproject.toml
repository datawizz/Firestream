[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "firestream-odoo"
version = "18.0.0"
description = "Firestream Odoo container dependencies"
requires-python = ">=3.12,<3.13"
dependencies = [
    # Core Odoo 18 dependencies (from official requirements.txt)
    "babel>=2.9.1",
    "chardet>=4.0.0",
    "cryptography>=40.0.0",
    "decorator>=5.1.1",
    "docutils>=0.17",
    "ebaysdk>=2.1.5",
    "freezegun>=1.1.0",
    "gevent>=21.8.0",
    "greenlet>=1.1.0",
    "idna>=3.3",
    "Jinja2>=3.0.3",
    "libsass>=0.20.1",
    "lxml>=4.9.0",
    "lxml-html-clean>=0.1.0",
    "MarkupSafe>=2.1.0",
    "num2words>=0.5.10",
    "ofxparse>=0.21",
    "passlib>=1.7.4",
    "Pillow>=9.0.0",
    "polib>=1.1.1",
    "psutil>=5.9.0",
    "psycopg2-binary>=2.9.3",
    "pydot>=1.4.2",
    "pyopenssl>=21.0.0",
    "PyPDF2>=2.0.0",
    "pyserial>=3.5",
    "python-dateutil>=2.8.2",
    "python-ldap>=3.4.0",
    "python-stdnum>=1.17",
    "pytz>=2022.1",
    "pyusb>=1.2.1",
    "qrcode>=7.3.1",
    "reportlab>=3.6.0",
    "requests>=2.27.0",
    "rjsmin>=1.2.0",
    "urllib3>=1.26.0",
    "vobject>=0.9.6.1",
    "Werkzeug>=2.2.0",
    "xlrd>=2.0.1",
    "XlsxWriter>=3.0.0",
    "xlwt>=1.3.0",
    "zeep>=4.1.0",

    # Additional dependencies for full Odoo functionality
    "geoip2>=4.6.0",
    "python-magic>=0.4.27",
    "google-auth>=2.16.0",

    # Web dependencies
    "gunicorn>=20.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "black>=23.7.0",
    "ruff>=0.0.285",
    "mypy>=1.4.0",
    "pre-commit>=3.3.0",
]

[tool.uv]
dev-dependencies = []

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/firestream_odoo"]
