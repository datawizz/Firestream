# Firestream Airflow - Docker Compose for Local Development
# Copyright Firestream. MIT License.
#
# Usage:
#   1. Build images: make airflow-build
#   2. Start all services: make airflow-start
#   3. Access Airflow at http://localhost:8090
#
# Default credentials: admin / admin

name: firestream-airflow

x-airflow-env: &airflow-env
  AIRFLOW_DATABASE_NAME: airflow
  AIRFLOW_DATABASE_USERNAME: airflow
  AIRFLOW_DATABASE_PASSWORD: airflow
  AIRFLOW_EXECUTOR: CeleryExecutor
  AIRFLOW_APISERVER_HOST: airflow
  AIRFLOW_STANDALONE_DAG_PROCESSOR: "yes"
  AIRFLOW_USERNAME: admin
  AIRFLOW_PASSWORD: admin
  # Shared secrets - all services must use the same keys
  AIRFLOW_FERNET_KEY: ZmlyZXN0cmVhbS1kZXYtZmVybmV0LWtleQ==
  AIRFLOW_WEBSERVER_SECRET_KEY: firestream-dev-webserver
  AIRFLOW_APISERVER_SECRET_KEY: firestream-dev-apiserver
  AIRFLOW_JWT_SECRET_KEY: firestream-dev-jwt-secret

x-airflow-common: &airflow-common
  image: firestream-airflow:3.0.3
  depends_on:
    postgresql:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgresql:
    image: firestream-postgresql:17
    volumes:
      - postgresql_data:/firestream/postgresql
    environment:
      POSTGRESQL_DATABASE: airflow
      POSTGRESQL_USERNAME: airflow
      POSTGRESQL_PASSWORD: airflow
      ALLOW_EMPTY_PASSWORD: "no"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: firestream-redis:7
    volumes:
      - redis_data:/firestream/redis/data
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    environment:
      <<: *airflow-env
      AIRFLOW_COMPONENT_TYPE: scheduler

  airflow-triggerer:
    <<: *airflow-common
    environment:
      <<: *airflow-env
      AIRFLOW_COMPONENT_TYPE: triggerer

  airflow-dag-processor:
    <<: *airflow-common
    environment:
      <<: *airflow-env
      AIRFLOW_COMPONENT_TYPE: dag-processor

  airflow-worker:
    <<: *airflow-common
    environment:
      <<: *airflow-env
      AIRFLOW_COMPONENT_TYPE: worker

  airflow:
    <<: *airflow-common
    environment:
      <<: *airflow-env
      AIRFLOW_APISERVER_HOST: "0.0.0.0"
    ports:
      - '8090:8080'

volumes:
  postgresql_data:
    driver: local
  redis_data:
    driver: local
