# Firestream Kafka - Nix-based Docker Compose

services:
  kafka:
    build:
      context: ../../../..
      dockerfile: src/containers/firestream/kafka/4.0/debian-12/Dockerfile
    image: firestream-kafka:4.0
    container_name: firestream-kafka
    ports:
      - '9092:9092'
      - '9093:9093'
    volumes:
      - 'kafka_data:/bitnami/kafka'
    environment:
      # KRaft settings
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@localhost:9093
      # Listeners
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Security
      - ALLOW_PLAINTEXT_LISTENER=yes
    # Note: healthcheck disabled due to Nix container exec sandbox limitations
    # The container runs correctly - verify with: nc -z localhost 9092
    healthcheck:
      disable: true

volumes:
  kafka_data:
    driver: local
