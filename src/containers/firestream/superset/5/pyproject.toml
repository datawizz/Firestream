[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "firestream-superset"
version = "5.0.0"
description = "Firestream Superset container dependencies - Pure Nix build replacing Bitnami stacksmith"
requires-python = ">=3.10,<3.13"
license = { text = "Apache-2.0" }

dependencies = [
    # Core Superset 5.x - includes all core dependencies (flask, sqlalchemy, pandas, etc.)
    # Uses version constraint to get latest 5.x release
    "apache-superset>=5.0.0,<6.0.0",

    # Pin marshmallow to 3.x - Superset uses minLength kwarg removed in marshmallow 4.x
    # See: https://github.com/apache/superset/issues/33162
    "marshmallow>=3.26.1,<4.0.0",

    # Required: pkg_resources used by Superset config.py at runtime
    "setuptools>=80.0.0",

    # WSGI Server - for production deployment
    "gunicorn>=22.0.0",
    "gevent>=24.2.1",
    "geventhttpclient>=2.3.1",

    # Celery extras for async queries (uses redis version compatible with superset)
    "celery[redis]>=5.3.0",
    "flower>=2.0.1",

    # Database drivers - PostgreSQL (primary, required for metadata DB)
    "psycopg2-binary>=2.9.9",

    # Database drivers - MySQL
    "mysqlclient>=2.2.4",
    "pymysql>=1.1.0",

    # Additional database backends (optional, commonly used)
    "clickhouse-connect>=0.7.0",
    "trino>=0.328.0",

    # Authentication - LDAP support
    "python-ldap>=3.4.4",

    # Slack integration for alerts
    "slack-sdk>=3.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "black>=24.1.0",
    "ruff>=0.2.0",
    "mypy>=1.8.0",
]

# Optional database drivers - install via uv add firestream-superset[bigquery]
bigquery = [
    "sqlalchemy-bigquery>=1.9.0",
    "google-cloud-bigquery>=3.17.0",
]
snowflake = [
    "snowflake-sqlalchemy>=1.5.1",
    "snowflake-connector-python>=3.6.0",
]
databricks = [
    "databricks-sql-connector>=3.1.0",
]
presto = [
    "pyhive[presto]>=0.7.0",
]
druid = [
    "pydruid>=0.6.6",
]
elasticsearch = [
    "elasticsearch-dbapi>=0.2.10",
]
redshift = [
    "sqlalchemy-redshift>=0.8.14",
    "redshift-connector>=2.0.918",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "black>=24.1.0",
    "ruff>=0.2.0",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["."]
