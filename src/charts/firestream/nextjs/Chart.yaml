# Copyright Firestream. MIT License.
# A net-new (non-Bitnami) Firestream supported app: a production Next.js server
# backed by a bundled firestream-postgresql subchart.
apiVersion: v2
name: nextjs
description: A production Next.js application packaged as a Firestream supported app, with a bundled PostgreSQL database.
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - nextjs
  - node
  - web
  - firestream
sources:
  - https://github.com/Cogent-Creation-Co/Firestream
dependencies:
  - condition: postgresql.enabled
    name: postgresql
    repository: oci://registry-1.docker.io/bitnamicharts
    version: 16.x.x
  - name: common
    repository: oci://registry-1.docker.io/bitnamicharts
    tags:
      - bitnami-common
    version: 2.x.x
